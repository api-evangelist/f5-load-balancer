specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: F5 Load Balancer
providerId: f5-load-balancer
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Application Delivery
  - BIG-IP
  - Load Balancer
  - Networking
  - Traffic Management
description: F5 BIG-IP iControl REST, AS3, and Declarative Onboarding APIs are management interfaces shipped
  with BIG-IP appliances/VEs and consumed by the customer in their own deployment; there is no public
  per-call API price. F5 prices the underlying BIG-IP product through enterprise channels — Subscription
  (1/2/3-year terms), Perpetual (GBB), Flex Consumption Program (3- or 5-year annual commitments), or
  via local resellers. A 30-day free trial is available.
notes: F5 does not publish list prices for BIG-IP. The plans below describe licensing programs (not API
  pricing) so consumers can map their cost surface. Reconcile against an active F5 quote when a contract
  is in place.
sources:
  - https://www.f5.com/products/get-f5
  - https://www.f5.com/products/big-ip-services
plans:
  - id: f5-load-balancer-trial
    name: 30-Day Free Trial
    type: freemium
    description: Self-service evaluation of BIG-IP for up to 30 days in the customer's environment.
    entries:
      - label: Trial license
        description: Time-bounded evaluation license for BIG-IP product.
        name: trial_license
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: F5 BIG-IP iControl REST API
      - name: F5 BIG-IP AS3 API
      - name: F5 BIG-IP Declarative Onboarding API
      - name: Self-service evaluation
  - id: f5-load-balancer-subscription
    name: Subscription
    type: subscription
    description: 1-, 2-, or 3-year term subscription for a specified number of BIG-IP instances. Includes
      maintenance and support; optional self-licensing.
    entries:
      - label: Subscription
        description: Per-instance subscription; pricing negotiated with F5 sales or reseller.
        name: subscription
        type: subscription
        metric: instance
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: 1/2/3-year terms
      - name: Maintenance & Support
      - name: Version updates
      - name: F5 BIG-IP iControl REST API
      - name: F5 BIG-IP AS3 API
      - name: F5 BIG-IP Declarative Onboarding API
  - id: f5-load-balancer-perpetual
    name: Perpetual (Good-Better-Best / GBB)
    type: enterprise
    description: Perpetual licenses, individually or bundled. Licenses remain valid for the product's
      lifetime.
    entries:
      - label: Perpetual license
        description: Lifetime license for selected services and instance count.
        name: perpetual_license
        type: flat
        metric: instance
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Lifetime validity
      - name: GBB bundles
      - name: Optional support contract
      - name: F5 BIG-IP iControl REST API
      - name: F5 BIG-IP AS3 API
      - name: F5 BIG-IP Declarative Onboarding API
  - id: f5-load-balancer-flex
    name: Flex Consumption Program (FCP)
    type: enterprise
    description: 3- or 5-year annual spending commitment that adjusts yearly based on actual usage. Covers
      deployable software and SaaS/managed services with premium support.
    entries:
      - label: Annual commitment
        description: Annual spend commitment with usage-based true-up; includes premium support, software
          upgrades, and activity reporting.
        name: fcp_commitment
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: 3- or 5-year commitment
      - name: Annual usage true-up
      - name: Premium Support
      - name: Software upgrades
      - name: Activity reporting
      - name: F5 BIG-IP iControl REST API
      - name: F5 BIG-IP AS3 API
      - name: F5 BIG-IP Declarative Onboarding API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
