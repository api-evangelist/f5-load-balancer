  - type: GitHubRepository
    url: https://github.com/F5Networks/f5-appsvcs-templates
- name: F5 BIG-IP Cloud Failover Extension API
  description: >-
    The Cloud Failover Extension (CFE) provides L3 failover functionality
    for BIG-IP systems deployed in cloud environments. CFE uses a declarative
    model to configure automatic failover across cloud providers including
    AWS, Azure, and Google Cloud Platform.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/products/extensions/f5-cloud-failover/latest/
