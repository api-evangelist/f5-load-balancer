    url: https://clouddocs.f5.com/products/big-iq/mgmt-api/latest/ApiReferences/
- name: F5 BIG-IP FAST API
  description: >-
    F5 BIG-IP Application Services Templates (FAST) provides a simplified
    way to deploy applications on the BIG-IP system using AS3. FAST offers
    a templating engine and REST API for creating, managing, and deploying
    application configurations through customizable or pre-built templates.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/products/extensions/f5-appsvcs-templates/latest/
  baseURL: https://{big-ip-host}/mgmt/shared/fast
  tags:
