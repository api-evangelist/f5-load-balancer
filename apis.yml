- name: F5 BIG-IQ Central Management API
  description: >-
    Centralized management API for administering multiple BIG-IP devices from
    a single BIG-IQ instance. Provides REST endpoints for device discovery,
    configuration management, analytics, and orchestrated deployments across
    a fleet of BIG-IP systems.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/products/big-iq/mgmt-api/latest/
  baseURL: https://{big-iq-host}/mgmt/cm
