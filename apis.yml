- name: F5 Distributed Cloud Services API
  description: >-
    REST API for managing F5 Distributed Cloud Services, including application
    delivery, security, and networking capabilities. Provides programmatic
    access to load balancing, WAF, DDoS protection, API security, DNS, and
    multi-cloud networking services through a declarative object model.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://docs.cloud.f5.com/docs-v2/api
  baseURL: https://{tenant}.console.ves.volterra.io/api
  tags:
