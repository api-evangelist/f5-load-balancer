    url: https://clouddocs.f5.com/products/extensions/f5-telemetry-streaming/latest/
  - type: GitHubRepository
    url: https://github.com/F5Networks/f5-telemetry-streaming
- name: F5 BIG-IP Declarative Onboarding API
  description: >-
    Declarative Onboarding (DO) extension for initial BIG-IP system
    configuration and provisioning. DO uses a declarative model to automate
    the initial setup of BIG-IP devices including licensing, DNS, NTP,
    VLANs, self IPs, and provisioning modules.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/products/extensions/f5-declarative-onboarding/latest/
  baseURL: https://{big-ip-host}/mgmt/shared/declarative-onboarding
  version: v1.x
  tags:
  - Onboarding
