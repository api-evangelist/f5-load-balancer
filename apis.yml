    url: https://github.com/f5devcentral/f5-ihealth-api-examples
- name: F5 BIG-IP NEXT Central Manager API
  description: >-
    The next-generation management API for F5 BIG-IP NEXT infrastructure.
    Provides a unified OpenAPI 3.0 REST interface for managing BIG-IP NEXT
    instances, including application deployment, WAF policies, analytics,
    notifications, and system administration through a central management
    console.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/bigip-next/latest/api_docs.html
