- name: F5 iHealth API
  description: >-
    REST-based API for working programmatically with the F5 iHealth
    diagnostics site. Enables management of QKView collections, access to
    diagnostic data, troubleshooting assistance, and retrieval of upgrade
    recommendations and known issue information.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/api/ihealth/
  baseURL: https://ihealth2-api.f5.com/qkview-analyzer/api
  tags:
