- name: F5 BIG-IP Container Ingress Services API
  description: >-
    F5 Container Ingress Services (CIS) integrates BIG-IP with Kubernetes
    and OpenShift container orchestration environments. CIS monitors the
    Kubernetes API to dynamically create, manage, and update L4/L7 services
    on BIG-IP systems based on changes to containerized application
    configurations.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/containers/latest/
  baseURL: https://{big-ip-host}/mgmt/tm
