- name: F5 BIG-IP iControl REST API
  description: >-
    Primary REST API for managing F5 BIG-IP systems including virtual servers,
    pools, nodes, and policies. iControl REST provides an imperative,
    RESTful interface for configuration and service control of BIG-IP devices
    from remote applications.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/api/icontrol-rest/
  baseURL: https://{big-ip-host}/mgmt/tm
  version: v13.0+
  tags:
  - REST API
  - Configuration
  - Management
  - iControl
  properties:
  - type: Documentation
    url: https://clouddocs.f5.com/api/icontrol-rest/
  - type: Reference
    url: https://clouddocs.f5.com/api/icontrol-rest/APIRef.html
  - type: Authentication
    url: https://clouddocs.f5.com/api/icontrol-rest/Authentication.html
  - type: Getting Started
    url: https://clouddocs.f5.com/api/
  contact:
  - FN: F5 Networks Support
    email: support@f5.com
    url: https://www.f5.com/services/support
- name: F5 BIG-IP AS3 API
  description: >-
    Application Services 3 Extension (AS3) for declarative API-based
    application deployment. AS3 is a flexible, low-overhead mechanism for
    managing application-specific configurations on a BIG-IP system using
    JSON declarations rather than imperative commands.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/products/extensions/f5-appsvcs-extension/latest/
  baseURL: https://{big-ip-host}/mgmt/shared/appsvcs
  version: v3.x
  tags:
  - Declarative
  - Application Services
  - Automation
  - AS3
  properties:
  - type: Documentation
    url: https://clouddocs.f5.com/products/extensions/f5-appsvcs-extension/latest/
  - type: Reference
    url: https://clouddocs.f5.com/products/extensions/f5-appsvcs-extension/latest/refguide/schema-reference.html
  - type: GitHubRepository
    url: https://github.com/F5Networks/f5-appsvcs-extension
  - type: Change Log
    url: https://github.com/f5networks/f5-appsvcs-extension/releases
- name: F5 BIG-IP Telemetry Streaming API
  description: >-
    Telemetry Streaming (TS) extension for forwarding BIG-IP statistics and
    events to third-party analytics consumers. TS uses a declarative model
    to configure the collection and forwarding of metrics, logs, and events
    from BIG-IP devices to external monitoring systems.
  image: https://www.f5.com/content/dam/f5-com/global-assets/images/f5-logo.svg
  humanURL: https://clouddocs.f5.com/products/extensions/f5-telemetry-streaming/latest/
  baseURL: https://{big-ip-host}/mgmt/shared/telemetry
  version: v1.x
  tags:
  - Telemetry
